<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ Transparent PNG Hub - 免费透明背景图片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .search-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-box:focus {
            border-color: #667eea;
        }
        
        .stats {
            text-align: center;
            color: #666;
            margin: 15px 0;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .image-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .image-container {
            position: relative;
            height: 200px;
            background: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.3s;
        }
        
        .image-card:hover img {
            transform: scale(1.05);
        }
        
        .image-info {
            padding: 20px;
        }
        
        .image-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .image-author {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .image-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }
        
        .tag {
            background: #f0f4ff;
            color: #5a67d8;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .download-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .download-btn:hover {
            opacity: 0.9;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 50px 0;
        }
        
        .no-results {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 50px 0;
            opacity: 0.8;
        }
        
        .image-meta {
            display: flex;
            gap: 10px;
            margin: 8px 0;
            font-size: 12px;
            color: #666;
            flex-wrap: wrap;
        }
        
        .meta-item {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        
        .attribution-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 400px;
            z-index: 1000;
        }
        
        .attribution-toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .attribution-toast p {
            margin: 0 0 10px 0;
        }
        
        .attribution-toast p:last-child {
            margin: 0;
            font-size: 14px;
            color: #666;
        }
        
        .attribution-toast a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .attribution-toast a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
            .search-container { padding: 15px; }
            .attribution-toast { 
                left: 20px; 
                right: 20px; 
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Transparent PNG Hub</h1>
            <p>高质量透明背景图片，免费下载，设计师首选</p>
        </div>
        
        <div class="search-container">
            <input 
                type="text" 
                id="search" 
                class="search-box" 
                placeholder="搜索图片...（试试输入：laptop, coffee, minimal）"
            >
            <div id="stats" class="stats">正在加载图片...</div>
        </div>
        
        <div id="loading" class="loading">🔄 加载中...</div>
        <div id="gallery" class="gallery"></div>
        <div id="no-results" class="no-results" style="display: none;">
            😔 没有找到相关图片，试试其他关键词吧
        </div>
    </div>

    <script>
        let allImages = [];
        let displayedImages = [];
        
        // 加载元数据
        async function loadImages() {
            try {
                const response = await fetch('./metadata.json');
                allImages = await response.json();
                
                console.log('已加载图片数量:', allImages.length);
                displayImages(allImages);
                updateStats(allImages.length, allImages.length);
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('加载图片失败:', error);
                document.getElementById('loading').innerHTML = '❌ 加载失败，请刷新页面重试';
            }
        }
        
        // 显示图片
        function displayImages(images) {
            const gallery = document.getElementById('gallery');
            const noResults = document.getElementById('no-results');
            
            if (images.length === 0) {
                gallery.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            displayedImages = images;
            
            gallery.innerHTML = images.map(img => `
                <div class="image-card" onclick="downloadImage('${img.id}', '${img.title}', '${img.author.name}', '${img.author.url}')">
                    <div class="image-container">
                        <img 
                            src="${img.urls.thumbnail}" 
                            alt="${img.title}"
                            loading="lazy"
                            onerror="this.parentElement.innerHTML='<div style=&quot;color:#999&quot;>图片加载失败</div>'"
                        >
                    </div>
                    <div class="image-info">
                        <div class="image-title">${img.title}</div>
                        <div class="image-author">📷 ${img.author.name}</div>
                        <div class="image-meta">
                            <span class="meta-item">📐 ${img.dimensions.width}×${img.dimensions.height}</span>
                            <span class="meta-item">📦 ${img.file_size}</span>
                            <span class="meta-item">⭐ ${img.quality_score}分</span>
                        </div>
                        <div class="image-tags">
                            ${img.tags.slice(0, 4).map(tag => 
                                `<span class="tag">${tag}</span>`
                            ).join('')}
                        </div>
                        <button class="download-btn" onclick="event.stopPropagation(); downloadImage('${img.id}', '${img.title}', '${img.author.name}', '${img.author.url}')">
                            ⬇️ 下载 PNG
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // 更新统计信息
        function updateStats(displayed, total) {
            document.getElementById('stats').innerHTML = 
                `📊 显示 ${displayed} 张图片，共 ${total} 张可用`;
        }
        
        // 搜索功能
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (!query) {
                displayImages(allImages);
                updateStats(allImages.length, allImages.length);
                return;
            }
            
            const filtered = allImages.filter(img => {
                const searchText = [
                    img.title,
                    img.author.name,
                    img.description,
                    img.category,
                    ...img.tags
                ].join(' ').toLowerCase();
                
                return searchText.includes(query);
            });
            
            displayImages(filtered);
            updateStats(filtered.length, allImages.length);
        });
        
        // 下载功能（包含署名）
        function downloadImage(imageId, title, authorName, authorUrl) {
            const img = allImages.find(i => i.id === imageId);
            if (!img) {
                // 兼容旧的调用方式
                const link = document.createElement('a');
                link.href = `./png/${imageId.replace('unsplash_', '')}.png`;
                link.download = `${title.replace(/[^a-z0-9\u4e00-\u9fa5]/gi, '_')}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                return;
            }
            
            // 创建下载链接
            const link = document.createElement('a');
            link.href = img.urls.download;
            link.download = `${title.replace(/[^a-z0-9\u4e00-\u9fa5]/gi, '_')}.png`;
            
            // 添加署名信息
            link.setAttribute('data-author', authorName);
            link.setAttribute('data-author-url', authorUrl);
            link.setAttribute('data-unsplash-url', img.unsplash.url);
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 显示署名提示
            showAttribution(authorName, authorUrl);
        }
        
        // 显示署名提示
        function showAttribution(authorName, authorUrl) {
            const toast = document.createElement('div');
            toast.className = 'attribution-toast';
            toast.innerHTML = `
                <p>✅ 下载成功！请记得署名：</p>
                <p>Photo by <a href="${authorUrl}" target="_blank">${authorName}</a> on <a href="https://unsplash.com" target="_blank">Unsplash</a></p>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 100);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 5000);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', loadImages);
    </script>
</body>
</html>
